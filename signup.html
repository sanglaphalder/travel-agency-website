<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Ruler Tours</title>
    <link rel="icon" href="assets/favicon.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="auth-logo-icon">👑</span>
                <span class="auth-logo-name">Ruler Tours</span>
                <span class="auth-logo-tagline">"We Burn Fuel, You Make Memories"</span>
            </div>

            <hr class="auth-divider">

            <h2 class="auth-title">Create an Account</h2>
            <p class="auth-subtitle">Join 500+ happy North Bengal travellers</p>

            <form class="auth-form" id="signupForm" novalidate>
                <div class="auth-field">
                    <label class="auth-label" for="signupName">Full Name</label>
                    <div class="auth-input-wrap">
                        <i class="fas fa-user icon-left"></i>
                        <input type="text" id="signupName" class="auth-input" placeholder="Your full name" required autocomplete="name">
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="signupEmail">Email Address</label>
                    <div class="auth-input-wrap">
                        <i class="fas fa-envelope icon-left"></i>
                        <input type="email" id="signupEmail" class="auth-input" placeholder="you@email.com" required autocomplete="email">
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="signupPhone">Phone / WhatsApp</label>
                    <div class="auth-input-wrap">
                        <i class="fas fa-phone icon-left"></i>
                        <input type="tel" id="signupPhone" class="auth-input" placeholder="+91 9876543210" autocomplete="tel">
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="signupPw">Password</label>
                    <div class="auth-input-wrap">
                        <i class="fas fa-lock icon-left"></i>
                        <input type="password" id="signupPw" class="auth-input" placeholder="Create a password" required autocomplete="new-password">
                        <button type="button" class="auth-toggle-pw" aria-label="Show password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="signupCpw">Confirm Password</label>
                    <div class="auth-input-wrap">
                        <i class="fas fa-lock icon-left"></i>
                        <input type="password" id="signupCpw" class="auth-input" placeholder="Repeat your password" required autocomplete="new-password">
                        <button type="button" class="auth-toggle-pw" aria-label="Show password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-submit">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <p class="auth-footer-text">
                Already have an account? <a href="login.html">Sign in</a>
            </p>
            <p class="auth-footer-text" style="margin-top:8px;">
                <a href="index.html" style="color:var(--text-light);">
                    <i class="fas fa-arrow-left" style="font-size:0.8em;"></i> Back to Home
                </a>
            </p>
        </div>
    </div>

    <script src="javascript/script.js"></script>
</body>
</html>
