<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Ruler Tours</title>
    <link rel="icon" href="assets/favicon.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <!-- Navbar injected by script.js (auth-aware) -->

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="auth-logo-icon">👑</span>
                <span class="auth-logo-name">Ruler Tours</span>
                <span class="auth-logo-tagline">"We Burn Fuel, You Make Memories"</span>
            </div>

            <hr class="auth-divider">

            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to manage your bookings</p>

            <form class="auth-form" id="loginForm" novalidate>
                <div class="auth-field">
                    <label class="auth-label" for="loginEmail">Email Address</label>
                    <div class="auth-input-wrap">
                        <i class="fas fa-envelope icon-left"></i>
                        <input type="email" id="loginEmail" class="auth-input" placeholder="you@email.com" required autocomplete="email">
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="loginPw">Password</label>
                    <div class="auth-input-wrap">
                        <i class="fas fa-lock icon-left"></i>
                        <input type="password" id="loginPw" class="auth-input" placeholder="Your password" required autocomplete="current-password">
                        <button type="button" class="auth-toggle-pw" aria-label="Show password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-submit">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <p class="auth-footer-text">
                Don't have an account? <a href="signup.html">Create one free</a>
            </p>
            <p class="auth-footer-text" style="margin-top:8px;">
                <a href="index.html" style="color:var(--text-light);">
                    <i class="fas fa-arrow-left" style="font-size:0.8em;"></i> Back to Home
                </a>
            </p>
        </div>
    </div>

    <script src="javascript/script.js"></script>
</body>
</html>
